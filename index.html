<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gourmet & Carbón - Gestión Interna</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="bg-dark text-white text-center py-4 mb-4">
    <h1 class="h2">Gourmet & Carbón</h1>
    <p class="lead mb-0">Sistema de Gestión Interna</p>
  </header>

  <main class="container mb-5">
    <section class="mb-5">
      <h2 class="text-center mb-4">Menú del Restaurante</h2>
      
      <div id="contenedorFiltros" class="d-flex justify-content-center gap-2 mb-4">
        <button type="button" class="btn btn-outline-dark btn-filtro active" data-categoria="Todos">Todos</button>
        <button type="button" class="btn btn-outline-dark btn-filtro" data-categoria="Entradas">Entradas</button>
        <button type="button" class="btn btn-outline-dark btn-filtro" data-categoria="Platos Fuertes">Platos Fuertes</button>
        <button type="button" class="btn btn-outline-dark btn-filtro" data-categoria="Postres">Postres</button>
      </div>

      <div id="contenedorMenu" class="row"></div>
    </section>

    <hr class="my-5" />

    <div class="row g-4">
      <section class="col-lg-5">
        <div class="p-4 bg-white border rounded shadow-sm">
          <h3 class="h4 mb-4">Realizar una Reserva</h3>
          <form id="form-reserva" novalidate>
            
            <div class="mb-3">
              <label for="nombre" class="form-label fw-bold">Nombre completo</label>
              <input type="text" id="nombre" class="form-control" placeholder="Ej: Carlos Alvarado" />
              <div id="error-nombre" class="error-campo"></div>
            </div>

            <div class="mb-3">
              <label for="correo" class="form-label fw-bold">Correo electrónico</label>
              <input type="email" id="correo" class="form-control" placeholder="ejemplo@correo.com" />
              <div id="error-correo" class="error-campo"></div>
            </div>

            <div class="mb-3">
              <label for="fecha" class="form-label fw-bold">Fecha de reserva</label>
              <input type="date" id="fecha" class="form-control" />
              <div id="error-fecha" class="error-campo"></div>
            </div>

            <div class="mb-3">
              <label for="hora" class="form-label fw-bold">Hora</label>
              <select id="hora" class="form-select">
                <option value="12:00">12:00</option>
                <option value="13:00">13:00</option>
                <option value="18:00">18:00</option>
                <option value="19:00">19:00</option>
                <option value="20:00">20:00</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="personas" class="form-label fw-bold">Número de personas</label>
              <input type="number" id="personas" class="form-control" placeholder="Mínimo 1, Máximo 20" />
              <div id="error-personas" class="error-campo"></div>
            </div>

            <div class="mb-4">
              <label for="comentarios" class="form-label fw-bold">Comentarios (Opcional)</label>
              <textarea id="comentarios" class="form-control" rows="3" placeholder="Indicaciones especiales..."></textarea>
            </div>

            <button type="submit" id="btnEnviar" class="btn btn-warning w-100 fw-bold text-uppercase" disabled>
              Confirmar Reserva
            </button>
          </form>
        </div>
      </section>

      <section class="col-lg-7">
        <div class="p-4 bg-white border rounded shadow-sm h-100 d-flex flex-column justify-content-between">
          <div>
            <h3 class="h4 mb-4">Lista de Reservas</h3>
            <div class="table-responsive">
              <table class="table table-bordered align-middle">
                <thead class="table-dark">
                  <tr>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th class="text-center">Personas</th>
                  </tr>
                </thead>
                <tbody id="listaReservasTabla">
                  </tbody>
              </table>
            </div>
          </div>

          <div class="resumen-reservas mt-4 p-3 rounded border">
            <h4 class="h5 mb-3 border-bottom pb-2">Resumen de Operaciones</h4>
            <p class="mb-2">Total de reservas registradas: <span id="resumenTotalReservas" class="fw-bold">0</span></p>
            <p class="mb-2">Total de personas esperadas: <span id="resumenTotalPersonas" class="fw-bold">0</span></p>
            <p class="mb-0">Reserva con mayor número de personas: <span id="resumenMayorReserva" class="fw-bold">Ninguna</span></p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
